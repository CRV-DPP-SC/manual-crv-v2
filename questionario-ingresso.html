<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluxo — Ingresso de Presos / Exame de Corpo de Delito</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-dark: #0a1628;
    --blue-mid: #0d2247;
    --blue-accent: #1a4fa0;
    --blue-light: #2563eb;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --white: #ffffff;
    --gray-100: #f0f4fb;
    --gray-200: #dde6f5;
    --gray-400: #8fa3cc;
    --gray-600: #4a6494;
    --radius: 16px;
    --radius-sm: 10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--blue-dark);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 2rem 1rem 4rem;
    position: relative; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 0%, rgba(26,79,160,0.35) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(201,168,76,0.12) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .page { position: relative; z-index: 1; width: 100%; max-width: 680px; }

  .header {
    display: flex; align-items: center; gap: 16px;
    padding: 1.5rem 2rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius); margin-bottom: 1.5rem;
    backdrop-filter: blur(8px);
  }
  .header-logo {
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, var(--blue-accent), var(--blue-light));
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    border: 1.5px solid rgba(201,168,76,0.4);
  }
  .header-logo svg { width: 24px; height: 24px; }
  .header-text { flex: 1; }
  .header-text h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 16px; color: var(--white); line-height: 1.3; font-weight: 400;
  }
  .header-text p { font-size: 12px; color: var(--gold); margin-top: 3px; letter-spacing: .04em; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #4ade80; box-shadow: 0 0 8px #4ade80; flex-shrink: 0;
  }

  .progress-wrap { margin-bottom: 1.25rem; }
  .progress-track { height: 3px; background: rgba(255,255,255,0.1); border-radius: 99px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--blue-light), var(--gold));
    border-radius: 99px; transition: width 0.5s cubic-bezier(.4,0,.2,1); width: 0%;
  }
  .progress-meta {
    display: flex; justify-content: space-between; margin-top: 6px;
    font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: .04em;
  }

  .chat-area {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem;
    min-height: 120px; backdrop-filter: blur(6px);
    display: flex; flex-direction: column; gap: 14px;
  }
  .msg { display: flex; gap: 10px; align-items: flex-end; }
  .msg.bot { flex-direction: row; }
  .msg.user { flex-direction: row-reverse; }
  .msg-av {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; align-self: flex-start;
  }
  .msg.bot .msg-av { background: rgba(37,99,235,0.2); border: 1px solid rgba(37,99,235,0.4); }
  .msg.user .msg-av { background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.3); }
  .msg-av svg { width: 16px; height: 16px; }
  .bubble {
    max-width: 82%; padding: 11px 15px; font-size: 14px; line-height: 1.6; border-radius: 16px;
  }
  .msg.bot .bubble {
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.9); border-bottom-left-radius: 4px;
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, var(--blue-accent), var(--blue-light));
    color: white; border-bottom-right-radius: 4px; border: 1px solid rgba(255,255,255,0.1);
  }
  .bubble strong { color: var(--gold-light); font-weight: 500; }
  .msg.user .bubble strong { color: rgba(255,255,255,0.9); }

  .typing { display: flex; gap: 5px; align-items: center; padding: 4px 2px; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,0.4); animation: blink 1.3s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

  .input-panel {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius); padding: 1.25rem 1.5rem; backdrop-filter: blur(8px);
  }
  .input-label {
    font-size: 10px; letter-spacing: .1em; color: var(--gold);
    text-transform: uppercase; margin-bottom: 12px; font-weight: 500;
  }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 9px 16px; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 99px; background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.8); font-size: 13px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all .2s;
  }
  .chip:hover { background: rgba(37,99,235,0.25); border-color: rgba(37,99,235,0.6); color: white; transform: translateY(-1px); }
  .chip.col { border-radius: var(--radius-sm); width: 100%; text-align: left; }

  .field {
    width: 100%; font-size: 14px; padding: 10px 14px;
    border: 1px solid rgba(255,255,255,0.15); border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.06); color: white;
    font-family: 'DM Sans', sans-serif; outline: none; transition: border-color .2s; margin-bottom: 8px;
  }
  .field:focus { border-color: var(--blue-light); background: rgba(37,99,235,0.1); }
  .field option { background: #0d2247; color: white; }
  textarea.field { resize: vertical; min-height: 80px; line-height: 1.6; }

  .btn-send {
    padding: 10px 22px;
    background: linear-gradient(135deg, var(--blue-accent), var(--blue-light));
    color: white; border: none; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 500; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all .2s; letter-spacing: .02em;
  }
  .btn-send:hover { transform: translateY(-1px); filter: brightness(1.1); }
  .btn-send:active { transform: translateY(0); }
  .btn-send.green { background: linear-gradient(135deg, #166534, #15803d); }

  .row { display: flex; gap: 8px; margin-top: 4px; align-items: center; }
  .row .field { margin-bottom: 0; flex: 1; }
  .dist-hint { font-size: 12px; color: var(--gray-400); white-space: nowrap; }

  /* optgroup styling hint */
  .field optgroup { font-weight: 600; color: var(--gold-light); background: #0a1a3a; }

  .success-box { text-align: center; padding: 2rem 1rem; }
  .success-circle {
    width: 60px; height: 60px; border-radius: 50%;
    background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3);
    display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;
  }
  .success-box h2 { font-family: 'DM Serif Display', serif; font-size: 22px; color: white; font-weight: 400; margin-bottom: 8px; }
  .success-box p { font-size: 14px; color: var(--gray-400); margin-bottom: 1.5rem; }
  .success-box strong { color: var(--gold-light); }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a7 7 0 0 1 7 7c0 4-3 6.5-4 8H9c-1-1.5-4-4-4-8a7 7 0 0 1 7-7z"/>

// ── Gênero gramatical por tipo de unidade ────────────────────────────────────
// Retorna { artigo: 'o'|'a', preposicao: 'do'|'da', adj_suffix }
function generoUnidade(nome) {
  const masc = /^(Presídio|Hospital de Custódia|Complexo|Unidade de Monitoramento)/i.test(nome);
  return masc
    ? { art: 'o', prep: 'no', prep2: 'ao', De: 'Do' }
    : { art: 'a', prep: 'na', prep2: 'à', De: 'Da' };
}

// Retorna string como "o Presídio Regional de Lages" ou "a Penitenciária Sul"
function uRef() {
  if (!ans.unidade) return 'a Unidade Prisional';
  const g = generoUnidade(ans.unidade);
  return `${g.art} <strong>${ans.unidade}</strong>`;
}
function uPrep() {
  // "dos presos recebidos pelo/pela X"
  if (!ans.unidade) return 'da Unidade Prisional';
  const g = generoUnidade(ans.unidade);
  return `${g.prep} <strong>${ans.unidade}</strong>`;
}
function uNome() { return ans.unidade || 'a Unidade Prisional'; }

const ans = {};
let step = 0;
const TOTAL = 8;

const botSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M12 2a7 7 0 0 1 7 7c0 4-3 6.5-4 8H9c-1-1.5-4-4-4-8a7 7 0 0 1 7-7z"/><path d="M9 21h6"/></svg>`;
const userSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>`;

const scOpts = () => SC.map(m => `<option value="${m}">${m}</option>`).join('');

function unidadeOpts() {
  return REGIONAIS.map(r =>
    `<optgroup label="${r.sr} — ${r.nome}">${r.unidades.map(u => `<option value="${u}">${u}</option>`).join('')}</optgroup>`
  ).join('');
}

function updateProgress() {
  const pct = Math.round((step / TOTAL) * 100);
  document.getElementById('pgbar').style.width = pct + '%';
  document.getElementById('pg-step').textContent = `Etapa ${step} de ${TOTAL}`;
  document.getElementById('pg-pct').textContent = pct + '%';
}

function addMsg(who, html) {
  const msgs = document.getElementById('msgs');
  const div = document.createElement('div');
  div.className = 'msg ' + who;
  div.innerHTML = `<div class="msg-av">${who === 'bot' ? botSVG : userSVG}</div><div class="bubble">${html}</div>`;
  msgs.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function showTyping() {
  const msgs = document.getElementById('msgs');
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typ';
  div.innerHTML = `<div class="msg-av">${botSVG}</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}
function removeTyping() { const t = document.getElementById('typ'); if (t) t.remove(); }
function clearInput() { document.getElementById('input-panel').innerHTML = ''; }

function botSay(html, delay = 650) {
  return new Promise(res => {
    showTyping();
    setTimeout(() => { removeTyping(); addMsg('bot', html); res(); }, delay);
  });
}

function chips(opts) {
  return new Promise(res => {
    const panel = document.getElementById('input-panel');
    panel.innerHTML = `<div class="input-label">Selecione uma opção</div><div class="chips" id="chip-grp"></div>`;
    const grp = document.getElementById('chip-grp');
    opts.forEach(o => {
      const btn = document.createElement('button');
      btn.className = 'chip' + (o.col ? ' col' : '');
      btn.textContent = o.label;
      btn.onclick = () => { clearInput(); addMsg('user', o.label); res(o); };
      grp.appendChild(btn);
    });
  });
}

function selectUnidade() {
  return new Promise(res => {
    const panel = document.getElementById('input-panel');
    panel.innerHTML = `<div class="input-label">Selecione a Unidade Prisional por Regional</div>
      <select class="field" id="sel-und"><option value="">— Selecione a Regional e a Unidade —</option>${unidadeOpts()}</select>
      <div class="row" style="margin-top:8px"><button class="btn-send" onclick="sendUnidade()">Confirmar</button></div>`;
    window.sendUnidade = () => {
      const v = document.getElementById('sel-und').value;
      if (!v) return;
      clearInput(); addMsg('user', v); res(v);
    };
  });
}

function selectUnidadeDestino(labelTexto) {
  return new Promise(res => {
    const panel = document.getElementById('input-panel');
    panel.innerHTML = `<div class="input-label">${labelTexto}</div>
      <select class="field" id="sel-dest"><option value="">— Selecione a Regional e a Unidade —</option>${unidadeOpts()}</select>
      <div class="row" style="margin-top:8px"><button class="btn-send" onclick="sendDest()">Confirmar</button></div>`;
    window.sendDest = () => {
      const v = document.getElementById('sel-dest').value;
      if (!v) return;
      clearInput(); addMsg('user', v); res(v);
    };
  });
}

function twoInputs(p1, p2) {
  return new Promise(res => {
    const panel = document.getElementById('input-panel');
    panel.innerHTML = `<div class="input-label">Preencha os campos</div>
      <input type="text" class="field" id="in1" placeholder="${p1}">
      <input type="text" class="field" id="in2" placeholder="${p2}">
      <div class="row" style="margin-top:4px"><button class="btn-send" onclick="send2()">Enviar</button></div>`;
    document.getElementById('in1').focus();
    window.send2 = () => {
      const v1 = document.getElementById('in1').value.trim();
      const v2 = document.getElementById('in2').value.trim();
      if (!v1 || !v2) return;
      clearInput(); addMsg('user', `${v1} — ${v2}`); res({ v1, v2 });
    };
  });
}

function textInput(placeholder) {
  return new Promise(res => {
    const panel = document.getElementById('input-panel');
    panel.innerHTML = `<div class="input-label">Digite sua resposta</div>
      <div class="row"><input type="text" class="field" id="txt-in" placeholder="${placeholder}" style="margin-bottom:0">
      <button class="btn-send" onclick="sendTxt()">Enviar</button></div>`;
    const inp = document.getElementById('txt-in');
    inp.focus();
    window.sendTxt = () => { const v = inp.value.trim(); if (!v) return; clearInput(); addMsg('user', v); res(v); };
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') window.sendTxt(); });
  });
}

function textArea(placeholder) {
  return new Promise(res => {
    const panel = document.getElementById('input-panel');
    panel.innerHTML = `<div class="input-label">Descreva com suas palavras</div>
      <textarea class="field" id="ta-in" placeholder="${placeholder}"></textarea>
      <div class="row" style="justify-content:flex-end"><button class="btn-send" onclick="sendTA()">Enviar</button></div>`;
    document.getElementById('ta-in').focus();
    window.sendTA = () => { const v = document.getElementById('ta-in').value.trim(); if (!v) return; clearInput(); addMsg('user', v); res(v); };
  });
}

function selectWithDist(label) {
  return new Promise(res => {
    const panel = document.getElementById('input-panel');
    panel.innerHTML = `<div class="input-label">${label}</div>
      <select class="field" id="sel-mun"><option value="">— Selecione o município —</option>${scOpts()}</select>
      <div class="row">
        <input type="number" class="field" id="dist-in" placeholder="Ex: 45" min="0" style="margin-bottom:0">
        <span class="dist-hint">km (aprox.)</span>
      </div>
      <div class="row" style="margin-top:10px"><button class="btn-send" onclick="sendSD()">Confirmar</button></div>`;
    window.sendSD = () => {
      const mun = document.getElementById('sel-mun').value;
      const dist = document.getElementById('dist-in').value;
      if (!mun || !dist || isNaN(dist) || Number(dist) < 0) return;
      clearInput(); addMsg('user', `${mun} — ${dist} km (aprox.)`);
      res({ mun, dist: dist + ' km (aprox.)' });
    };
  });
}

// ── Fluxo principal ───────────────────────────────────────────────────────────
async function flow() {
  updateProgress();

  await botSay('Selecione a <strong>Unidade Prisional</strong>. As unidades estão organizadas por Superintendência Regional:', 550);

  step++; updateProgress();

  ans.recebe_presos = recebe.value;

  if (recebe.value === 'SIM') {

    const sexo = await chips([{ value: 'MASCULINO', label: 'Masculino' }, { value: 'FEMININO', label: 'Feminino' }, { value: 'AMBOS', label: 'Ambos' }]);
    ans.sexo_presos = sexo.label;

    // Se recebe só masculino → perguntar para onde vão as femininas
    if (sexo.value === 'MASCULINO') {
      await botSay(`E as <strong>presas femininas</strong>, para qual Unidade Prisional são encaminhadas?`, 650);
      ans.encaminhamento_feminino = await selectUnidadeDestino('Selecione a Unidade Prisional de destino das femininas');
    }
    // Se recebe só feminino → perguntar para onde vão os masculinos
    if (sexo.value === 'FEMININO') {
      await botSay(`E os <strong>presos masculinos</strong>, para qual Unidade Prisional são encaminhados?`, 650);
      ans.encaminhamento_masculino = await selectUnidadeDestino('Selecione a Unidade Prisional de destino dos masculinos');
    }

  } else {
    // Não recebe presos → perguntar destino de cada sexo e encerrar

    ans.encaminhamento_masculino = await selectUnidadeDestino('Selecione a Unidade Prisional de destino dos masculinos');

    ans.encaminhamento_feminino = await selectUnidadeDestino('Selecione a Unidade Prisional de destino das femininas');

    clearInput();
    await botSay(`Obrigado, <strong>${ans.resp_nome}</strong>! As informações ${g.prep} <strong>${ans.unidade}</strong> foram registradas. Salvando...`, 800);

    function detectarRegional(nomeUnidade) {
      for (const r of REGIONAIS) {
        if (r.unidades.includes(nomeUnidade)) return { sr: r.sr, nome: r.nome };
      }
      return { sr: 'SR00', nome: 'Não identificada' };
    }

    const regional = detectarRegional(ans.unidade);
