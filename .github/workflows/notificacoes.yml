name: Notificações push (CRV)

on:
  # Disparado externamente (cron-job.org) via workflow_dispatch — o agendamento
  # nativo do GitHub Actions ("schedule") não é confiável para intervalos curtos
  # (ficamos com atrasos de até ~2h entre execuções na prática).
  workflow_dispatch: {}

jobs:
  enviar:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notificacoes-bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node enviar-notificacoes.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
